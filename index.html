<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Estudiantes</title>
    <link rel="stylesheet" href="styles.css">
    <script src="api/registrar.js"></script>
<script src="script.js"></script>
</head>
<body>
    <img src="logo.png" alt="Logo de la Institución" class="logo" width="150">

    <h1>Registro de Estudiantes</h1>
    <p>Complete todos los campos solicitados.</p>

    <form id="registroForm">

        <label for="nombre">Nombre(s):</label><br>
        <input type="text" id="nombre" name="nombre" required><br><br>

        <label for="apellidoP">Apellido Paterno:</label><br>
        <input type="text" id="apellidoP" name="apellidoP" required><br><br>

        <label for="apellidoM">Apellido Materno:</label><br>
        <input type="text" id="apellidoM" name="apellidoM" required><br><br>

        <label for="matricula">Matrícula:</label><br>
        <input type="text" id="matricula" name="matricula" required><br><br>

        <label for="carrera">Carrera:</label><br>
        <input type="text" id="carrera" name="carrera" required><br><br>

        <label for="semestre">Semestre:</label><br>
        <input type="number" id="semestre" name="semestre" min="1" max="12" required><br><br>

        <label for="grupo">Grupo:</label><br>
        <input type="text" id="grupo" name="grupo" required><br><br>

        <label for="correo">Correo Institucional:</label><br>
        <input type="email" id="correo" name="correo" required><br><br>

        <label for="fecha">Fecha:</label><br>
        <input type="date" id="fecha" name="fecha" required><br><br>

        <label for="hora">Hora:</label><br>
        <input type="time" id="hora" name="hora" required><br><br>

        <label for="motivo">Motivo del Registro:</label><br>
        <input type="text" id="motivo" name="motivo" required><br><br>

        <label for="observaciones">Observaciones:</label><br>
        <textarea id="observaciones" name="observaciones" rows="4"></textarea><br><br>

        <button type="submit">Registrar</button>

    </form>
    <div id="resultado"></div>


</body>
</html>
