<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alumnos Registrados</title>

<style>

body{
    background: linear-gradient(135deg, rgb(144,146,154), rgb(107,107,116));
    background-size: 400% 400%;
    animation: fondo 12s ease infinite;

    font-family: 'Segoe UI', Arial, sans-serif;

    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;

    min-height: 100vh;

    margin: 0;
    padding: 30px;

    color: white;
}

.contenedor{

    width: 95%;
    max-width: 1400px;

    background: rgba(255,255,255,0.12);

    padding: 35px;

    border-radius: 28px;

    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    border: 1px solid rgba(255,255,255,0.1);

    box-shadow:
        0 15px 40px rgba(0,0,0,0.35),
        inset 0 0 20px rgba(255,255,255,0.05);

    animation: aparecer .8s ease;
}

img{
    margin-bottom: 20px;

    transition: .4s;

    filter:
        drop-shadow(0 0 15px rgba(255,255,255,.2));
}

img:hover{
    transform: scale(1.1) rotate(-4deg);
}

h1{
    margin-bottom: 20px;

    animation:
        aparecer .8s ease,
        glow 3s ease infinite alternate;
}

.total{

    display: inline-block;

    margin-bottom: 20px;

    padding: 12px 20px;

    border-radius: 12px;

    background: rgba(255,255,255,.08);

    font-weight: bold;
}

.tabla-scroll{
    overflow-x: auto;
}

table{

    width: 100%;

    border-collapse: collapse;

    border-radius: 15px;

    overflow: hidden;

    background: rgba(255,255,255,.05);
}

th{

    background: rgba(255,255,255,.15);

    padding: 15px;

    color: white;

    font-size: 15px;
}

td{

    padding: 14px;

    border-bottom: 1px solid rgba(255,255,255,.08);

    text-align: center;
}

tbody tr{

    transition: .3s;
}

tbody tr:hover{

    background: rgba(255,255,255,.08);

    transform: scale(1.01);
}

@keyframes aparecer{

    from{
        opacity: 0;
        transform: translateY(25px);
    }

    to{
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fondo{

    0%{
        background:
        linear-gradient(
            135deg,
            rgb(118,120,127),
            rgb(95,95,104)
        );
    }

    50%{
        background:
        linear-gradient(
            135deg,
            rgb(77,75,85),
            rgb(48,48,54)
        );
    }

    100%{
        background:
        linear-gradient(
            135deg,
            rgb(89,91,98),
            rgb(30,30,38)
        );
    }
}

@keyframes glow{

    from{
        text-shadow:
            0 0 5px rgba(255,255,255,.15),
            0 0 15px rgba(255,255,255,.08);
    }

    to{
        text-shadow:
            0 0 10px rgba(255,255,255,.35),
            0 0 25px rgba(255,255,255,.15);
    }
}

</style>

</head>
<body>

<img src="logo.png" width="120">

<h1>Alumnos Registrados</h1>

<div class="contenedor">

```
<div class="total">
    Total de registros: <span id="total">0</span>
</div>

<div class="tabla-scroll">

    <table>

        <thead>

            <tr>
                <th>ID</th>
                <th>Nombre Completo</th>
                <th>Matrícula</th>
                <th>Carrera</th>
                <th>Semestre</th>
                <th>Grupo</th>
                <th>Correo</th>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Motivo</th>
            </tr>

        </thead>

        <tbody id="tabla">

        </tbody>

    </table>

</div>
```

</div>

<script>

async function cargarDatos(){

    try{

        const respuesta = await fetch('/api/listar');

        const datos = await respuesta.json();

        document.getElementById('total').textContent = datos.length;

        let html = '';

        datos.forEach(alumno => {

            html += `
                <tr>
                    <td>${alumno.id}</td>
                    <td>${alumno.nombre} ${alumno.apellido_p} ${alumno.apellido_m}</td>
                    <td>${alumno.matricula}</td>
                    <td>${alumno.carrera}</td>
                    <td>${alumno.semestre}</td>
                    <td>${alumno.grupo}</td>
                    <td>${alumno.correo}</td>
                    <td>${alumno.fecha}</td>
                    <td>${alumno.hora}</td>
                    <td>${alumno.motivo}</td>
                </tr>
            `;

        });

        document.getElementById('tabla').innerHTML = html;

    }catch(error){

        console.error(error);

        alert('Error al cargar los registros');

    }

}

cargarDatos();

</script>

</body>
</html>
